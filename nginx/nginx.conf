# ================================================================
# nginx.conf — TEMPLATE
#
# File ini di-generate otomatis oleh scripts/install-vps.sh
# dengan domain yang kamu input saat instalasi.
#
# JANGAN edit manual — jalankan install-vps.sh untuk generate ulang.
# ================================================================

events {
    worker_connections 1024;
}

http {
    resolver 127.0.0.11 valid=30s ipv6=off;

    # ---- Portal utama ----
    server {
        listen 80;
        server_name DOMAIN_PLACEHOLDER;

        client_max_body_size 50M;

        location / {
            proxy_pass http://devplatform-portal:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 60s;
            proxy_connect_timeout 10s;
        }
    }

    # ---- Adminer ----
    server {
        listen 80;
        server_name db-admin.DOMAIN_PLACEHOLDER;

        location / {
            proxy_pass http://devplatform-adminer:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    # ---- Catch-all ----
    server {
        listen 80 default_server;
        server_name _;
        return 301 http://DOMAIN_PLACEHOLDER$request_uri;
    }
}
