events {
    worker_connections 1024;
}

http {
    resolver 127.0.0.11 valid=30s ipv6=off;

    # ---- Portal utama: dev.netprem.org → portal:3000 ----
    server {
        listen 80;
        server_name dev.netprem.org;

        client_max_body_size 50M;

        location / {
            proxy_pass http://devplatform-portal:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 60s;
            proxy_connect_timeout 10s;
        }
    }

    # ---- Adminer: db-admin.dev.netprem.org ----
    server {
        listen 80;
        server_name db-admin.dev.netprem.org;

        location / {
            proxy_pass http://devplatform-adminer:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    # ---- Catch-all: redirect ke portal ----
    server {
        listen 80 default_server;
        server_name _;
        return 301 http://dev.netprem.org$request_uri;
    }
}
