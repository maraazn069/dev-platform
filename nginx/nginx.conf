events {
    worker_connections 1024;
}

http {
    # ---- Portal utama: dev.netprem.org → portal:3000 ----
    server {
        listen 80;
        server_name dev.netprem.org;

        location / {
            proxy_pass http://devplatform-portal:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # ---- Adminer (web UI database) ----
    server {
        listen 80;
        server_name db-admin.dev.netprem.org;

        location / {
            proxy_pass http://devplatform-adminer:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    # ---- Template user (diisi otomatis oleh add-user.sh) ----
    # Contoh setelah jalankan: sudo bash scripts/add-user.sh budi password123 8082
    # Uncomment dan sesuaikan:

    # server {
    #     listen 80;
    #     server_name budi.dev.netprem.org;
    #     location / {
    #         proxy_pass http://codeserver-budi:8443;
    #         proxy_set_header Host $host;
    #         proxy_set_header Upgrade $http_upgrade;
    #         proxy_set_header Connection upgrade;
    #         proxy_set_header Accept-Encoding gzip;
    #     }
    # }

    # ---- Catch-all: semua domain lain → redirect ke portal ----
    server {
        listen 80 default_server;
        server_name _;
        return 301 http://dev.netprem.org$request_uri;
    }
}
