# ============================================================
# docker-compose.yml — Self-Hosted Dev Platform
# Untuk 1-10 user, tujuan belajar
#
# Cara pakai:
#   1. cp .env.example .env
#   2. Edit .env sesuai domain & password kamu
#   3. docker compose up -d
#
# Tambah user individual: sudo bash scripts/add-user.sh namauser
# ============================================================

version: "3.9"

services:

  # ---- Nginx Reverse Proxy ----
  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    networks:
      - devplatform
    depends_on:
      - watchtower

  # ---- Watchtower: Auto-update containers ----
  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 86400
    networks:
      - devplatform

  # ---- Portainer: Web UI untuk manage Docker ----
  # Akses di https://portainer.DOMAIN (setelah setup DNS)
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: unless-stopped
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - devplatform

# ============================================================
# Catatan: Container code-server untuk tiap user
# TIDAK didefinisikan di sini, melainkan dibuat otomatis
# oleh script scripts/add-user.sh
# ============================================================

volumes:
  portainer_data:

networks:
  devplatform:
    driver: bridge
