# ============================================================
# docker-compose.yml — Self-Hosted Dev Platform
# Versi lengkap dengan Portal, PostgreSQL, MySQL
#
# Cara pakai:
#   1. cp .env.example .env && nano .env
#   2. docker compose up -d
#   3. Akses portal: https://dev.domainmu.com
# ============================================================

services:

  # ---- Portal Login & Dashboard ----
  # Mount docker.sock supaya portal bisa exec ke container lain (mysql, postgres, nginx)
  # untuk provision user, create database, reload nginx, dll
  portal:
    build:
      context: .
      dockerfile: Dockerfile.portal
    container_name: devplatform-portal
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - SESSION_SECRET=${SESSION_SECRET}
      - DOMAIN=${DOMAIN}
      - PROTOCOL=${PROTOCOL:-http}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - PGADMIN_EMAIL=${PGADMIN_EMAIL:-admin@local.dev}
      - PGADMIN_PASSWORD=${PGADMIN_PASSWORD:-admin123}
      - TZ=${TZ:-Asia/Jakarta}
      - IDLE_TIMEOUT_MIN=${IDLE_TIMEOUT_MIN:-60}
      - CODE_SERVER_MEM=${CODE_SERVER_MEM:-2g}
      - CODE_SERVER_CPUS=${CODE_SERVER_CPUS:-1.5}
      - CODE_SERVER_PIDS=${CODE_SERVER_PIDS:-300}
      - DB_REMOTE_IPS=${DB_REMOTE_IPS:-}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-}
    volumes:
      - ./server/data:/app/server/data
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/devplatform/data:/opt/devplatform/data
      - ./nginx/nginx.conf:/app/nginx/nginx.conf
    networks:
      - devplatform
    deploy:
      resources:
        limits: { memory: 512M, cpus: '0.5' }
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', r => process.exit(r.statusCode===200?0:1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ---- Nginx Reverse Proxy ----
  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - devplatform
    depends_on:
      portal:
        condition: service_healthy

  # ---- PostgreSQL Shared (untuk semua user belajar) ----
  # Port 5432 dibuka publik supaya user bisa konek dari laptop (DBeaver, pgAdmin, dll)
  postgres:
    image: postgres:15-alpine
    container_name: devplatform-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: devplatform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-postgres.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - devplatform
    deploy:
      resources:
        limits: { memory: 2G, cpus: '1.0' }
    logging:
      driver: json-file
      options: { max-size: "20m", max-file: "5" }
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- MySQL Shared (untuk semua user belajar) ----
  # Port 3306 dibuka publik supaya user bisa konek dari laptop (MySQL Workbench, dll)
  mysql:
    image: mysql:8.0
    container_name: devplatform-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: devplatform_shared
      MYSQL_USER: admin
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/init-mysql.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - devplatform
    deploy:
      resources:
        limits: { memory: 2G, cpus: '1.0' }
    logging:
      driver: json-file
      options: { max-size: "20m", max-file: "5" }
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --bind-address=0.0.0.0
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- File Browser (web UI untuk admin browse /opt/devplatform/data) ----
  # Akses via https://files.DOMAIN, login pertama: admin/admin (wajib ganti).
  # Mount root /opt/devplatform/data → admin bisa upload/download/edit file
  # semua user (workspace, project, .trash) lewat browser.
  filebrowser:
    image: filebrowser/filebrowser:s6
    container_name: devplatform-filebrowser
    restart: unless-stopped
    expose:
      - "80"
    environment:
      - PUID=0
      - PGID=0
      - TZ=${TZ:-Asia/Jakarta}
    volumes:
      - /opt/devplatform/data:/srv
      - filebrowser_db:/database
      - filebrowser_config:/config
    networks:
      - devplatform
    deploy:
      resources:
        limits: { memory: 256M, cpus: '0.3' }
    logging:
      driver: json-file
      options: { max-size: "5m", max-file: "3" }
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ---- phpMyAdmin: Web UI lengkap untuk MySQL (gaya cPanel) ----
  # Akses: https://mysql.dev.domainmu.com
  # AllowArbitraryServer aktif supaya bisa auto-login dari portal dengan kredensial user
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: devplatform-phpmyadmin
    restart: unless-stopped
    expose:
      - "80"
    environment:
      PMA_HOST: devplatform-mysql
      PMA_PORT: 3306
      PMA_ABSOLUTE_URI: ${PROTOCOL:-http}://mysql.${DOMAIN}/
      UPLOAD_LIMIT: 256M
    networks:
      - devplatform
    depends_on:
      - mysql

  # ---- pgAdmin: Web UI lengkap untuk PostgreSQL ----
  # Akses: https://pgadmin.dev.domainmu.com
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: devplatform-pgadmin
    restart: unless-stopped
    expose:
      - "80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@local.dev}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
      PGADMIN_LISTEN_PORT: 80
      PGADMIN_CONFIG_SERVER_MODE: 'True'
      PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION: 'True'
      SCRIPT_NAME: ""
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - devplatform
    depends_on:
      - postgres

  # ---- Portainer: Web UI untuk manage Docker ----
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: unless-stopped
    ports:
      - "127.0.0.1:9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - devplatform

  # ---- Watchtower: Auto-update containers ----
  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 86400 --cleanup
    networks:
      - devplatform

# ---- Container code-server per user ----
# Dibuat otomatis oleh portal saat admin tambah user dari /admin
# Atau manual: sudo bash scripts/add-user.sh namauser

volumes:
  postgres_data:
  mysql_data:
  portainer_data:
  pgadmin_data:
  filebrowser_db:
  filebrowser_config:

networks:
  devplatform:
    driver: bridge
