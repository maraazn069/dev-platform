# ============================================================
# docker-compose.yml — Self-Hosted Dev Platform
# Versi lengkap dengan Portal, PostgreSQL, MySQL
#
# Cara pakai:
#   1. cp .env.example .env && nano .env
#   2. docker compose up -d
#   3. Akses portal: https://dev.domainmu.com
# ============================================================

services:

  # ---- Portal Login & Dashboard ----
  portal:
    build:
      context: .
      dockerfile: Dockerfile.portal
    container_name: devplatform-portal
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - SESSION_SECRET=${SESSION_SECRET}
      - DOMAIN=${DOMAIN}
      - PROTOCOL=${PROTOCOL:-http}
    volumes:
      - ./server/data:/app/server/data
    networks:
      - devplatform
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', r => process.exit(r.statusCode===200?0:1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ---- Nginx Reverse Proxy ----
  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - devplatform
    depends_on:
      portal:
        condition: service_healthy

  # ---- PostgreSQL Shared (untuk semua user belajar) ----
  postgres:
    image: postgres:15-alpine
    container_name: devplatform-postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: devplatform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-postgres.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - devplatform
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- MySQL Shared (untuk semua user belajar) ----
  mysql:
    image: mysql:8.0
    container_name: devplatform-mysql
    restart: unless-stopped
    ports:
      - "127.0.0.1:3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: devplatform_shared
      MYSQL_USER: admin
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/init-mysql.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - devplatform
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- phpMyAdmin: Web UI lengkap untuk MySQL (gaya cPanel) ----
  # Akses: https://mysql.dev.domainmu.com
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: devplatform-phpmyadmin
    restart: unless-stopped
    expose:
      - "80"
    environment:
      PMA_HOST: devplatform-mysql
      PMA_PORT: 3306
      PMA_ABSOLUTE_URI: ${PROTOCOL:-http}://mysql.${DOMAIN}/
      UPLOAD_LIMIT: 256M
    networks:
      - devplatform
    depends_on:
      - mysql

  # ---- pgAdmin: Web UI lengkap untuk PostgreSQL ----
  # Akses: https://pgadmin.dev.domainmu.com
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: devplatform-pgadmin
    restart: unless-stopped
    expose:
      - "80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@local.dev}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
      PGADMIN_LISTEN_PORT: 80
      PGADMIN_CONFIG_SERVER_MODE: 'True'
      PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION: 'True'
      SCRIPT_NAME: ""
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - devplatform
    depends_on:
      - postgres

  # ---- Portainer: Web UI untuk manage Docker ----
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: unless-stopped
    ports:
      - "127.0.0.1:9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - devplatform

  # ---- Watchtower: Auto-update containers ----
  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 86400 --cleanup
    networks:
      - devplatform

# ---- Container code-server per user ----
# Dibuat otomatis oleh: sudo bash scripts/add-user.sh namauser
# Tidak didefinisikan di sini supaya lebih fleksibel

volumes:
  postgres_data:
  mysql_data:
  portainer_data:
  pgadmin_data:

networks:
  devplatform:
    driver: bridge
